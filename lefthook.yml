pre-commit:
  parallel: true
  jobs:
    - run: bunx oxfmt --no-error-on-unmatched-pattern
      exclude:
        - dist
      glob:
        - "*"
      stage_fixed: true

    - run: bun run lint
      glob:
        - "*.ts"
        - "*.js"
        - "*.tsx"
        - "*.jsx"
      exclude:
        - dist
      stage_fixed: true
